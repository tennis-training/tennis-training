name: Unit Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: |
          node --test tests/metrics-parity.test.mjs tests/twilio-alert.test.mjs
          node --check scripts/check-twilio-balance.mjs
