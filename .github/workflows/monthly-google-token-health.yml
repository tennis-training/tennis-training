name: Monthly Google Token Health Check

on:
  workflow_dispatch:
    inputs:
      force_fail:
        description: 'Set true to force a controlled failure test'
        required: false
        default: 'false'
  schedule:
    # Runs monthly on the 1st at 00:00 UTC
    - cron: '0 0 1 * *'

permissions:
  contents: read

concurrency:
  group: monthly-google-token-health
  cancel-in-progress: true

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Google token and calendar access
        run: node scripts/check-google-token-health.mjs
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}

      - name: Force controlled failure (test mode)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_fail == 'true' }}
        run: |
          echo "Controlled failure test requested."
          exit 1
